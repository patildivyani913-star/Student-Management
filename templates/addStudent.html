<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Student</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Add Student</h1>

<form action="/add" method="POST">

<label>Name</label>

<input type="text"
       name="name"
       required>

<label>Age</label>

<input type="number"
       name="age"
       required>

<label>Course</label>

<input type="text"
       name="course"
       required>

<label>City</label>

<input type="text"
       name="city"
       required>

<button type="submit">

Add Student

</button>

</form>

<br>

<a href="{{ url_for('home') }}">

Home

</a>

</div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>View Students</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Student List</h1>

<a href="{{ url_for('add_student') }}" class="btn">

Add New Student

</a>

<br><br>

<table>

<tr>

<th>ID</th>

<th>Name</th>

<th>Age</th>

<th>Course</th>

<th>City</th>

<th>Update</th>

<th>Delete</th>

</tr>

{% for student in students %}

<tr>

<td>{{ student["id"] }}</td>

<td>{{ student["name"] }}</td>

<td>{{ student["age"] }}</td>

<td>{{ student["course"] }}</td>

<td>{{ student["city"] }}</td>

<td>

<a href="{{ url_for('update_student', id=student['id']) }}">

Update

</a>

</td>

<td>

<a href="{{ url_for('delete_student', id=student['id']) }}">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="{{ url_for('home') }}">

Home

</a>

</div>

</body>

</html>
